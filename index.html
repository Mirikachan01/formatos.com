<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>LEGION STORE</title>
<link rel="stylesheet" href="style.css">

<link rel="icon" type="image/png" href="logo.png">
</head>

<div id="loadingScreen">

<img src="logo.png" class="loading-logo">

<h2>Cargando formatos...</h2>

<div class="loader"></div>

</div>

<body>
   <!-- Video de fondo -->
  <video autoplay muted loop id="bg-video">
    <source src="video.mp4" type="video/mp4">
    Tu navegador no soporta videos de fondo.
  </video>

  <!-- Capa de overlay para oscurecer -->
  <div class="overlay"></div>


<header>
<h1>LEGIÓN STORE</h1>
</header>

<div class="search-box">
<input type="text" id="search" placeholder="Buscar servicio...">
</div>
<button class="calc-btn" onclick="openCalculator()">🧮 Calculadora</button>
<div id="services" class="services"></div>

<div id="formSection" class="form-section hidden">

<h2 id="serviceTitle"></h2>

<div id="dynamicForm"></div>

<button class="generate" onclick="generateText()">Generar mensaje</button>

<textarea id="result"></textarea>

<button class="copy" onclick="copyText()">Copiar</button>

<button class="back" onclick="goBack()">Volver</button>

</div>

<script src="script.js"></script>

</body>
</html>
